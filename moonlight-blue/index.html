<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moonlight Blue</title>
  <style>
    :root {
      --sky-top: #06142b;
      --sky-mid: #0d2b52;
      --sky-bottom: #133c68;
      --moon: #f5f3e8;
      --moon-glow: rgba(255, 255, 220, 0.28);
      --star: rgba(255,255,255,0.9);
      --water-top: #0a2240;
      --water-bottom: #081325;
      --reflect: rgba(214, 234, 255, 0.18);
      --mountain-back: #10233f;
      --mountain-front: #081425;
      --text-main: #eef6ff;
      --text-sub: #bdd4f3;
      --accent: #9fd1ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at 50% 25%, var(--moon-glow) 0 10%, transparent 25%),
        linear-gradient(to bottom, var(--sky-top), var(--sky-mid) 45%, var(--sky-bottom));
      color: var(--text-main);
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .moon {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffffff, var(--moon) 65%, #dad6c8 100%);
      box-shadow:
        0 0 25px rgba(255,255,220,0.35),
        0 0 60px rgba(255,255,220,0.22),
        0 0 100px rgba(255,255,220,0.12);
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--star);
      box-shadow: 0 0 8px rgba(255,255,255,0.8);
      animation: twinkle 4s infinite ease-in-out;
    }

    .star:nth-child(2)  { top: 14%; left: 18%; animation-delay: 0s; }
    .star:nth-child(3)  { top: 22%; left: 28%; animation-delay: 1s; }
    .star:nth-child(4)  { top: 18%; left: 72%; animation-delay: 2s; }
    .star:nth-child(5)  { top: 26%; left: 82%; animation-delay: 3s; }
    .star:nth-child(6)  { top: 12%; left: 60%; animation-delay: 1.5s; }
    .star:nth-child(7)  { top: 30%; left: 12%; animation-delay: 2.5s; }
    .star:nth-child(8)  { top: 35%; left: 76%; animation-delay: 0.5s; }

    .mountain-back {
      position: absolute;
      left: -5%;
      bottom: 26%;
      width: 110%;
      height: 30%;
      background: var(--mountain-back);
      clip-path: polygon(
        0% 100%, 0% 65%, 10% 52%, 18% 62%, 28% 40%, 40% 68%,
        50% 44%, 62% 72%, 74% 38%, 86% 60%, 100% 48%, 100% 100%
      );
    }

    .mountain-front {
      position: absolute;
      left: -5%;
      bottom: 20%;
      width: 110%;
      height: 28%;
      background: var(--mountain-front);
      clip-path: polygon(
        0% 100%, 0% 70%, 12% 48%, 24% 74%, 38% 42%, 52% 78%,
        67% 50%, 78% 68%, 90% 44%, 100% 64%, 100% 100%
      );
    }

    .water {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 28%;
      background: linear-gradient(to bottom, var(--water-top), var(--water-bottom));
      overflow: hidden;
    }

    .reflection {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.25),
        rgba(180,220,255,0.12) 35%,
        transparent 80%
      );
      clip-path: polygon(48% 0%, 58% 0%, 70% 100%, 30% 100%);
      filter: blur(1px);
      opacity: 0.85;
    }

    .wave {
      position: absolute;
      width: 140%;
      height: 18px;
      left: -20%;
      border-top: 1px solid var(--reflect);
      border-radius: 50%;
      opacity: 0.6;
      animation: drift 8s linear infinite;
    }

    .wave.w1 { top: 16%; animation-delay: 0s; }
    .wave.w2 { top: 28%; animation-delay: 1.5s; }
    .wave.w3 { top: 42%; animation-delay: 3s; }
    .wave.w4 { top: 58%; animation-delay: 4.5s; }

    .title-box {
      position: absolute;
      left: 50%;
      top: 58%;
      transform: translateX(-50%);
      text-align: center;
      padding: 18px 28px;
      background: rgba(4, 11, 24, 0.22);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      backdrop-filter: blur(6px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.25);
    }

    .title-box h1 {
      font-size: 2.3rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-main);
    }

    .title-box p {
      margin-top: 10px;
      font-size: 1rem;
      color: var(--text-sub);
      letter-spacing: 0.08em;
    }

    .accent {
      color: var(--accent);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    @keyframes drift {
      0% { transform: translateX(0); opacity: 0.35; }
      50% { transform: translateX(2%); opacity: 0.7; }
      100% { transform: translateX(0); opacity: 0.35; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="moon"></div>

    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>
    <div class="star"></div>

    <div class="mountain-back"></div>
    <div class="mountain-front"></div>

    <div class="title-box">
      <h1>MOONLIGHT <span class="accent">BLUE</span></h1>
      <p>quiet night · silver moon · deep reflection</p>
    </div>

    <div class="water">
      <div class="reflection"></div>
      <div class="wave w1"></div>
      <div class="wave w2"></div>
      <div class="wave w3"></div>
      <div class="wave w4"></div>
    </div>
  </div>
</body>
</html>
